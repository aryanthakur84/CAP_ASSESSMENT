_schema-version: 3.3.0
ID: epm-complete
description: A simple CAP project.
version: 1.0.0
modules:
- name: epm-complete-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: epm-complete-auth
  - name: epm-complete-db
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: epm-complete
  type: approuter.nodejs
  path: app/router
  requires:
  - name: epm-complete-html5-runtime
  - name: srv-api
    group: destinations
    properties:
      forwardAuthToken: true
      name: srv-api
      url: ~{srv-url}
  - name: epm-complete-auth
  - name: epm-complete-destination-service
    group: destinations
    properties:
      forwardAuthToken: false
      name: ui5
      url: https://ui5.sap.com
  provides:
  - name: app-api
    properties:
      app-protocol: ${protocol}
      app-uri: ${default-uri}
  parameters:
    disk-quota: 512M
    keep-existing-routes: true
    memory: 256M
- name: epm-complete-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: epm-complete-db
  parameters:
    buildpack: nodejs_buildpack
- name: epm-complete-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: epm-complete-auth
  - name: srv-api
  - name: epm-complete-repo-host
    parameters:
      config:
        HTML5Runtime_enabled: true
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - pomanagement.zip
      name: pomanagement
      target-path: resources/
- name: pomanagement
  type: html5
  path: app/po-management
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: epm-complete-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        redirect-uris:
        - https://*~{app-api/app-uri}/**
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
  requires:
  - name: app-api
- name: epm-complete-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: epm-complete-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: epm-complete-html5-service
    service-plan: app-host
    config:
      HTML5Runtime_enabled: true
- name: epm-complete-html5-runtime
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-runtime
- name: epm-complete-destination-service
  type: org.cloudfoundry.managed-service
  requires:
  - name: srv-api
  - name: app-api
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
            HTML5.ForwardAuthToken: true
            HTML5.DynamicDestination: true
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: epm-complete-destination-service
    service-plan: lite
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production